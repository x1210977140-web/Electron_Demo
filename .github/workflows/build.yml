name: Build Electron App

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      # 【注解1】检出代码
      # 将代码仓库检出到 GitHub Actions 运行环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 【注解2】设置 Node.js 环境
      # 配置指定版本的 Node.js 运行环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 【注解3】安装依赖
      # 使用 npm ci 安装依赖（比 npm install 更快且更可靠）
      - name: Install dependencies
        run: npm ci

      # 【注解4】构建应用
      # 根据不同平台执行相应的构建命令
      - name: Build app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build

      - name: Build app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build -- --win

      - name: Build app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build -- --linux

      # 【注解5】上传构建产物
      # 将构建好的应用文件上传到 GitHub Actions
      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-demo-macos
          path: dist/*.dmg

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-demo-windows
          path: dist/*.exe

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-demo-linux
          path: dist/*.AppImage

  release:
    # 【注解6】仅在推送标签时触发发布
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 【注解7】下载所有平台的构建产物
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # 【注解8】创建 GitHub Release
      # 自动创建 GitHub Release 并附加构建产物
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/electron-demo-macos/*.dmg
            ./artifacts/electron-demo-windows/*.exe
            ./artifacts/electron-demo-linux/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
